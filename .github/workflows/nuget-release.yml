name: nuget-release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 10.2.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nuget-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish to NuGet.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: 'Cache: ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Invalid version '$VERSION' — expected SemVer like 10.2.0 or 10.2.0-rc.1"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Restore
        run: dotnet restore nuke-common.slnx

      - name: Build
        run: >-
          dotnet build nuke-common.slnx
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >-
          dotnet test nuke-common.slnx
          --configuration Release
          --no-build
          --logger "GitHubActions;summary.includePassedTests=false"
          -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >-
          dotnet pack nuke-common.slnx
          --configuration Release
          --no-build
          --output ./output
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          -p:RepositoryCommit=${{ github.sha }}

      - name: List packages
        run: ls -lh ./output/*.nupkg

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: ./output/*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push './output/*.nupkg'
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
